name: Deploy model to GCP manually
on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant language/task for deployment'
        required: true
        type: choice
        options:
          - asr-bf16
          - asr-standard
          - translation-rap
          - translation-arn
          - tts
          - raw

      model_path:
        description: 'Source model path inside STORAGE_URI (for translation/raw). Example: nllb/rap/nllb-200-3.3b-spa-rap'
        required: false
        type: string

jobs:
  build-push-gcp:
    name: Build and Push Model to GCP
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || 'STAGING' }}
    env:
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      ARTIFACT_REGION: ${{ vars.ARTIFACT_REGION }}
      ARTIFACT_REGISTRY_NAME: model
      STORAGE_URI: ${{ vars.STORAGE_URI }}

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Check out code
        uses: actions/checkout@v4
        with:
          sparse-checkout: Model/

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@v0.4.0
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 416.0.0'

      - name: Download models and prepare build context
        working-directory: Model/
        run: |
          VARIANT="${{ github.event.inputs.variant }}"
          echo "=== Processing variant: $VARIANT ==="

          case "$VARIANT" in
            asr-bf16 | asr-standard)
              SUB_FOLDER=$([[ "$VARIANT" == "asr-bf16" ]] && echo "bf16" || echo "")
              MMS_GCS_PATH="asr-rap/mms$([[ -n "$SUB_FOLDER" ]] && echo "-$SUB_FOLDER" || echo "")"
              RAP_ADAPTER_GCS_PATH="asr-rap/mms/adapter.rap.bin"
              SPA_ADAPTER_GCS_PATH="asr-rap/mms/adapter.spa.bin"

              echo "Downloading MMS ($VARIANT)..."
              mkdir -p mms
              gcloud storage cp -r ${{ env.STORAGE_URI }}/$MMS_GCS_PATH/* mms/

              echo "Downloading Rapa Nui Adapter..."
              gcloud storage cp ${{ env.STORAGE_URI }}/$RAP_ADAPTER_GCS_PATH mms/adapter.rap.bin

              echo "Downloading Spanish Adapter..."
              gcloud storage cp ${{ env.STORAGE_URI }}/$SPA_ADAPTER_GCS_PATH mms/adapter.spa.bin

              echo "dockerfile=Dockerfile.asr" >> $GITHUB_ENV
              echo "image_tag=asr-rap$([[ -n "$SUB_FOLDER" ]] && echo "-$SUB_FOLDER" || echo "")" >> $GITHUB_ENV
              [[ "$VARIANT" == "asr-bf16" ]] && echo "ASR_USE_BF16=true" >> $GITHUB_ENV
              ;;

            translation-rap | translation-arn)
              SOURCE_PATH="${{ github.event.inputs.model_path }}"
              if [[ -z "$SOURCE_PATH" ]]; then
                if [[ "$VARIANT" == "translation-rap" ]]; then SOURCE_PATH="nllb/rap/nllb-200-3.3b-spa-rap"; else SOURCE_PATH="nllb/arn/model"; fi
              fi
              RUNTIME_NAME="translation_model"

              echo "Downloading translation model from $SOURCE_PATH..."
              mkdir -p "$RUNTIME_NAME"
              gcloud storage cp -r ${{ env.STORAGE_URI }}/$SOURCE_PATH/* "$RUNTIME_NAME"/

              echo "dockerfile=Dockerfile" >> $GITHUB_ENV
              echo "image_tag=$VARIANT" >> $GITHUB_ENV
              ;;

            tts)
              echo "Downloading TTS models..."
              mkdir -p tts-rap/rap/female tts-rap/rap/male
              gcloud storage cp -r ${{ env.STORAGE_URI }}/tts-rap/rap/female/* tts-rap/rap/female/
              gcloud storage cp -r ${{ env.STORAGE_URI }}/tts-rap/rap/male/* tts-rap/rap/male/

              echo "dockerfile=Dockerfile.audio" >> $GITHUB_ENV
              echo "image_tag=tts" >> $GITHUB_ENV
              ;;

            raw)
              SOURCE_PATH="${{ github.event.inputs.model_path }}"
              echo "Downloading raw model from $SOURCE_PATH..."
              mkdir -p raw_model
              gcloud storage cp -r ${{ env.STORAGE_URI }}/$SOURCE_PATH/* raw_model/

              echo "dockerfile=Dockerfile" >> $GITHUB_ENV
              echo "image_tag=raw-model" >> $GITHUB_ENV
              ;;
          esac

      - name: Build Docker Image
        working-directory: Model/
        run: |
          echo "Building with Dockerfile: $dockerfile"
          docker build \
            --build-arg HF_TOKEN=${{ secrets.HUGGING_FACE_TOKEN }} \
            --build-arg ASR_USE_BF16=${{ env.ASR_USE_BF16 || 'false' }} \
            -t model:${{ github.sha }} \
            -f $dockerfile .

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGION }}-docker.pkg.dev --quiet

      - name: Push Docker Image
        run: |
          FULL_IMAGE_NAME=${{ env.ARTIFACT_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_NAME }}/${{ env.image_tag }}:${{ github.sha }}
          LATEST_IMAGE_NAME=${{ env.ARTIFACT_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_NAME }}/${{ env.image_tag }}:latest

          docker tag model:${{ github.sha }} $FULL_IMAGE_NAME
          docker tag model:${{ github.sha }} $LATEST_IMAGE_NAME

          docker push $FULL_IMAGE_NAME
          docker push $LATEST_IMAGE_NAME
          echo "Pushed: $FULL_IMAGE_NAME"
